  <line x1="40" y1="25" x2="55" y2="13" stroke="#000" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="25" x2="65" y2="13" stroke="#000" stroke-width="0.5" opacity="0.3"/>

  <!-- Right -->
