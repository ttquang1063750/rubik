<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e1116"/>
  <defs>
    <radialGradient id="bgGrad" cx="70%" cy="-10%" r="80%">
      <stop offset="0%" style="stop-color:#1b2430;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1116;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="cubeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5097B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeGrad3" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" style="stop-color:#009b48;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007a39;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Rubik Cube (large, left side) -->
  <g transform="translate(280, 150)">
    <!-- Front face -->
    <polygon points="150,120 330,120 330,300 150,300" fill="url(#cubeGrad1)" stroke="#000" stroke-width="3"/>
    <line x1="210" y1="120" x2="210" y2="300" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="270" y1="120" x2="270" y2="300" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="150" y1="180" x2="330" y2="180" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="150" y1="240" x2="330" y2="240" stroke="#000" stroke-width="2" opacity="0.4"/>

    <!-- Top face -->
    <polygon points="150,120 240,30 420,30 330,120" fill="url(#cubeGrad2)" stroke="#000" stroke-width="3"/>
    <line x1="195" y1="75" x2="285" y2="165" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="240" y1="75" x2="330" y2="165" stroke="#000" stroke-width="2" opacity="0.4"/>

    <!-- Right face -->
    <polygon points="330,120 420,30 420,210 330,300" fill="url(#cubeGrad3)" stroke="#000" stroke-width="3"/>
    <line x1="375" y1="75" x2="375" y2="255" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="330" y1="180" x2="420" y2="120" stroke="#000" stroke-width="2" opacity="0.4"/>
    <line x1="330" y1="240" x2="420" y2="180" stroke="#000" stroke-width="2" opacity="0.4"/>

    <!-- Shine -->
    <ellipse cx="210" cy="180" rx="30" ry="25" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Text -->
  <text x="700" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#e6edf3">
    Rubik Solver
  </text>
  <text x="700" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="500" fill="#9aa7b4">
    Nhập màu · Xem cách giải
  </text>

  <!-- Badge/Tagline -->
  <g>
    <rect x="700" y="330" width="450" height="70" rx="12" fill="#1a2535" stroke="#4f8cff" stroke-width="2" opacity="0.8"/>
    <text x="730" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#4f8cff">
      🧩 Online • Miễn phí • Offline
    </text>
  </g>

  <!-- Bottom accent -->
  <line x1="700" y1="520" x2="1100" y2="520" stroke="#4f8cff" stroke-width="3" opacity="0.6"/>
</svg>
