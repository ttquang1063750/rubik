<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (optional) -->
  <defs>
    <linearGradient id="cubeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5097B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cubeGrad3" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" style="stop-color:#FFD500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rubik Cube 3D representation -->
  <!-- Front face - Red/Pink -->
  <g id="front-face">
    <polygon points="70,60 130,60 130,120 70,120" fill="url(#cubeGrad1)" stroke="#000" stroke-width="1.5"/>
    <!-- Grid lines for 3x3 -->
    <line x1="85" y1="60" x2="85" y2="120" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="60" x2="100" y2="120" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="115" y1="60" x2="115" y2="120" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="80" x2="130" y2="80" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="100" x2="130" y2="100" stroke="#000" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Top face - Blue -->
  <g id="top-face">
    <polygon points="70,60 100,35 160,35 130,60" fill="url(#cubeGrad2)" stroke="#000" stroke-width="1.5"/>
    <!-- Grid -->
    <line x1="80" y1="49" x2="110" y2="24" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="90" y1="49" x2="120" y2="24" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="85" y1="60" x2="115" y2="35" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="60" x2="130" y2="35" stroke="#000" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Right face - Yellow/Orange -->
  <g id="right-face">
    <polygon points="130,60 160,35 160,95 130,120" fill="url(#cubeGrad3)" stroke="#000" stroke-width="1.5"/>
    <!-- Grid -->
    <line x1="140" y1="49" x2="140" y2="109" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="150" y1="49" x2="150" y2="109" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="137" y1="60" x2="157" y2="50" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="137" y1="80" x2="157" y2="70" stroke="#000" stroke-width="1" opacity="0.3"/>
    <line x1="137" y1="100" x2="157" y2="90" stroke="#000" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Highlight/Shine effect -->
  <ellipse cx="95" cy="75" rx="12" ry="10" fill="#fff" opacity="0.15"/>
  <ellipse cx="145" cy="65" rx="8" ry="6" fill="#fff" opacity="0.2"/>
</svg>
